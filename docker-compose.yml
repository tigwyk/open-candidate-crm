services:
  postgres:
    image: postgres:16
    restart: unless-stopped
    environment:
      POSTGRES_USER: campaignground
      POSTGRES_PASSWORD: campaignground
      POSTGRES_DB: campaignground
    ports:
      - "55432:5432"
    volumes:
      - campaignground-pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U campaignground -d campaignground"]
      interval: 5s
      timeout: 5s
      retries: 10

volumes:
  campaignground-pgdata:
