name: Release

on:
  push:
    tags:
      - "v*"

jobs:
  release:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: ci
          POSTGRES_PASSWORD: ci
          POSTGRES_DB: ci
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    env:
      DATABASE_URL: "postgresql://ci:ci@localhost:5432/ci"
    steps:
      - uses: actions/checkout@v7

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Install dependencies
        run: bun install

      - name: Lint
        run: bun run lint

      - name: Generate Prisma client
        run: bun run db:generate

      - name: Apply migrations
        run: bun run db:migrate:deploy

      - name: Build
        run: bun run build

      - name: Test
        run: bun test

      - name: Extract changelog section for this tag
        run: |
          version="${GITHUB_REF_NAME#v}"
          awk -v ver="$version" '
            $0 ~ "^## \\[" ver "\\]" { found=1; next }
            found && /^## \[/ { exit }
            found { print }
          ' CHANGELOG.md > release-notes.md
          if [ ! -s release-notes.md ]; then
            echo "_No CHANGELOG.md entry found for $version — see commit history._" > release-notes.md
          fi

      # Notes are written to a file and passed via --notes-file rather than
      # interpolated into this run: script — a CHANGELOG entry containing
      # backticks (e.g. `bun test`) would otherwise be re-parsed by the shell
      # as command substitution if embedded directly via ${{ }}.
      - name: Create GitHub Release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          tag="${GITHUB_REF_NAME}"
          prerelease_flag=""
          if [[ "$tag" == *-* ]]; then
            prerelease_flag="--prerelease"
          fi
          gh release create "$tag" \
            --title "$tag" \
            --notes-file release-notes.md \
            $prerelease_flag
